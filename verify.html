<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Verification - Arewa Deliver</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="assets/images/logo.png" type="image/png">
</head>
<body class="bg-gray-50 font-sans flex items-center justify-center min-h-screen">

  <div class="bg-white shadow-lg rounded-lg w-full max-w-md p-8">
    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <img src="assets/images/logo.png" alt="Arewa Deliver Logo" class="h-14 w-14">
    </div>

    <h2 class="text-2xl font-bold text-center text-blue-800 mb-4">Verify Your Email</h2>
    <p class="text-gray-600 text-center mb-6">
      A verification code has been sent to your email. Please enter it below to activate your account.
    </p>

    <!-- Verification Form -->
    <form action="login.html" method="POST" class="space-y-4">
      <div>
        <label class="block text-gray-700 mb-1 font-medium">Verification Code</label>
        <input type="text" name="verification_code" placeholder="Enter code here" required
               class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <button type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 font-semibold transition duration-200">
        Verify Email
      </button>
    </form>

    <p class="text-center text-gray-600 mt-4">
      Didn't receive the code?
      <a href="forgot.html" class="text-blue-600 font-medium hover:underline">Resend</a>
    </p>
  </div>

</body>
</html>
