<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Arewa Deliver</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="../assets/images/logo.png" type="image/png">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white rounded-lg shadow p-8 space-y-6">
    <div class="flex flex-col items-center">
      <img src="../assets/images/logo.png" alt="Arewa Deliver Logo" class="h-16 w-16 mb-2">
      <h1 class="text-2xl font-bold text-blue-800">Admin Login</h1>
      <p class="text-gray-600 mt-1">Sign in to manage the platform</p>
    </div>

    <form class="space-y-5">
      <div>
        <label for="email" class="block text-gray-700 font-medium mb-1">Email</label>
        <input type="email" id="email" placeholder="admin@example.com" required
          class="w-full px-4 py-2 border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-600"/>
      </div>
      <div>
        <label for="password" class="block text-gray-700 font-medium mb-1">Password</label>
        <input type="password" id="password" placeholder="********" required
          class="w-full px-4 py-2 border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-600"/>
      </div>
      <div class="flex justify-between items-center">
        <label class="flex items-center space-x-2">
          <input type="checkbox" class="form-checkbox h-4 w-4 text-blue-600">
          <span class="text-gray-600 text-sm">Remember me</span>
        </label>
        <a href="../reset.html" class="text-blue-600 text-sm hover:underline">Forgot password?</a>
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Login</button>
    </form>

    <p class="text-gray-600 text-center text-sm">
      Not an admin? <a href="../index.html" class="text-blue-600 hover:underline">Go back home</a>
    </p>
  </div>

</body>
</html>
