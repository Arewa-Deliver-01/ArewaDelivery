<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rider Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- Header -->
  <header class="bg-white shadow p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-gray-800">Rider Dashboard</h1>
    <a href="rider_profile.html" class="text-sm font-medium text-blue-600">Profile</a>
  </header>

  <!-- Stats -->
  <section class="p-4 grid grid-cols-2 gap-4">
    <div class="bg-white p-4 rounded-xl shadow">
      <p class="text-gray-500 text-sm">Today's Deliveries</p>
      <h2 class="text-2xl font-bold text-gray-800">12</h2>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
      <p class="text-gray-500 text-sm">Earnings Today</p>
      <h2 class="text-2xl font-bold text-green-600">₦8,200</h2>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
      <p class="text-gray-500 text-sm">Pending Tasks</p>
      <h2 class="text-2xl font-bold text-orange-500">3</h2>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
      <p class="text-gray-500 text-sm">Completed</p>
      <h2 class="text-2xl font-bold text-blue-600">57</h2>
    </div>
  </section>

  <!-- Quick Actions -->
  <section class="px-4 mb-3">
    <h2 class="font-semibold text-gray-800 mb-2">Quick Actions</h2>

    <div class="grid grid-cols-3 gap-3">
      <a href="rider_new_delivery.html"
        class="bg-blue-600 text-white p-4 rounded-xl text-center font-medium">
        New Requests
      </a>

      <a href="rider_ongoing.html"
        class="bg-yellow-500 text-white p-4 rounded-xl text-center font-medium">
        Ongoing
      </a>

      <a href="rider_wallet.html"
        class="bg-green-600 text-white p-4 rounded-xl text-center font-medium">
        Wallet
      </a>
    </div>
  </section>

  <!-- Recent Deliveries -->
  <section class="px-4 mb-20">
    <h2 class="font-semibold text-gray-800 mb-3">Recent Deliveries</h2>

    <div class="bg-white p-4 rounded-xl shadow mb-3">
      <p class="font-medium text-gray-800">Pickup → Unguwar Rimi</p>
      <p class="text-sm text-gray-500">2 hours ago</p>
      <span class="text-green-600 text-sm font-semibold">Completed</span>
    </div>

    <div class="bg-white p-4 rounded-xl shadow mb-3">
      <p class="font-medium text-gray-800">Sabon Gari → Kawo</p>
      <p class="text-sm text-gray-500">4 hours ago</p>
      <span class="text-blue-600 text-sm font-semibold">Delivered</span>
    </div>
  </section>

  <!-- Bottom Navigation -->
  <nav class="fixed bottom-0 left-0 w-full bg-white shadow-lg py-3 px-6 flex justify-between">
    <a href="rider_dashboard.html" class="text-blue-600 font-bold">Home</a>
    <a href="rider_ongoing.html" class="text-gray-600">Ongoing</a>
    <a href="rider_notifications.html" class="text-gray-600">Notifications</a>
    <a href="rider_profile.html" class="text-gray-600">Profile</a>
  </nav>

</body>
</html>
