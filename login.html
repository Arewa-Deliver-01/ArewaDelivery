<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Arewa Deliver</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="assets/images/logo.png" type="image/png">
</head>
<body class="bg-gray-50 font-sans flex items-center justify-center min-h-screen">

  <!-- Login Container -->
  <div class="bg-white shadow-lg rounded-lg w-full max-w-md p-8">
    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <img src="assets/images/logo.png" alt="Arewa Deliver Logo" class="h-14 w-14">
    </div>
    <h2 class="text-2xl font-bold text-center text-blue-800 mb-4">Welcome Back!</h2>
    <p class="text-gray-600 text-center mb-6">Login to your account to continue.</p>

    <!-- Login Form -->
    <form action="customer_dashboard.html" method="POST" class="space-y-4">
      <!-- Role Selection -->
      <div>
        <label class="block text-gray-700 mb-1 font-medium">Login as</label>
        <select name="role" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="customer">Customer</option>
          <option value="vendor">Vendor</option>
          <option value="rider">Rider</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-gray-700 mb-1 font-medium">Email</label>
        <input type="email" name="email" placeholder="you@example.com" required
               class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- Password -->
      <div>
        <label class="block text-gray-700 mb-1 font-medium">Password</label>
        <input type="password" name="password" placeholder="********" required
               class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- Forgot Password -->
      <div class="text-right">
        <a href="forgot.html" class="text-blue-600 hover:underline text-sm">Forgot Password?</a>
      </div>

      <!-- Submit Button -->
      <button type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 font-semibold transition duration-200">
        Login
      </button>
    </form>

    <!-- Divider -->
    <div class="flex items-center my-6">
      <hr class="flex-grow border-gray-300">
      <span class="mx-2 text-gray-400">OR</span>
      <hr class="flex-grow border-gray-300">
    </div>

    <!-- Register Link -->
    <p class="text-center text-gray-600">
      Don't have an account?
      <a href="register.html" class="text-blue-600 font-medium hover:underline">Register now</a>
    </p>
  </div>

</body>
</html>
