<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stores - Customer</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.4/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans">
  <!-- Navbar -->
  <nav class="bg-white shadow p-4 flex justify-between items-center">
    <a href="customer_dashboard.html" class="text-xl font-bold text-blue-600">ArewaDeliver</a>
    <div>
      <a href="customer_notifications.html" class="mr-4 text-gray-600 hover:text-blue-600">Notifications</a>
      <a href="customer_profile.html" class="text-gray-600 hover:text-blue-600">Profile</a>
    </div>
  </nav>

  <!-- Page Header -->
  <header class="p-6">
    <h1 class="text-2xl font-bold text-gray-800">Available Stores</h1>
    <p class="text-gray-500 mt-1">Browse and select your favorite vendor</p>
  </header>

  <!-- Stores Grid -->
  <main class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Single Store Card -->
    <a href="customer_store.html" class="bg-white rounded-lg shadow p-4 hover:shadow-lg transition">
      <img src="../assets/images/logo.png" alt="Store Logo" class="w-24 h-24 rounded-full mx-auto">
      <h2 class="text-lg font-semibold mt-4 text-center text-gray-800">Store Name</h2>
      <p class="text-gray-500 text-center mt-1">Location / Description</p>
    </a>

    <!-- Duplicate Store Cards as needed -->
    <a href="customer_store.html" class="bg-white rounded-lg shadow p-4 hover:shadow-lg transition">
      <img src="../assets/images/logo.png" alt="Store Logo" class="w-24 h-24 rounded-full mx-auto">
      <h2 class="text-lg font-semibold mt-4 text-center text-gray-800">Store Name 2</h2>
      <p class="text-gray-500 text-center mt-1">Location / Description</p>
    </a>
  </main>
</body>
</html>
