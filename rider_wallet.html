<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rider Wallet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- Header -->
  <header class="bg-white shadow p-4">
    <h1 class="text-xl font-bold text-gray-800">My Wallet</h1>
  </header>

  <section class="p-4">

    <!-- Balance Card -->
    <div class="bg-blue-600 text-white rounded-xl p-6 shadow-lg">
      <p class="text-sm opacity-80">Available Balance</p>
      <h2 class="text-3xl font-bold mt-1">₦85,200</h2>

      <button class="mt-4 bg-white text-blue-600 px-5 py-2 rounded-lg font-semibold shadow">
        Withdraw Funds
      </button>
    </div>

    <!-- Quick Actions -->
    <div class="grid grid-cols-2 gap-3 mt-6">
      <button class="bg-white p-4 shadow rounded-xl text-center">
        <p class="font-semibold text-gray-800">Add Money</p>
      </button>

      <button class="bg-white p-4 shadow rounded-xl text-center">
        <p class="font-semibold text-gray-800">Transaction Report</p>
      </button>
    </div>

    <!-- Transaction History -->
    <div class="bg-white mt-6 rounded-xl shadow p-4">
      <h3 class="font-bold text-gray-800 mb-4">Recent Transactions</h3>

      <div class="space-y-4">

        <!-- Item 1 -->
        <div class="flex justify-between items-center">
          <div>
            <p class="font-medium text-gray-800">Delivery Payment</p>
            <p class="text-xs text-gray-500">Today, 12:40 PM</p>
          </div>
          <p class="font-bold text-green-600">+ ₦3,200</p>
        </div>

        <!-- Item 2 -->
        <div class="flex justify-between items-center">
          <div>
            <p class="font-medium text-gray-800">Withdrawal</p>
            <p class="text-xs text-gray-500">Yesterday, 4:15 PM</p>
          </div>
          <p class="font-bold text-red-600">- ₦15,000</p>
        </div>

        <!-- Item 3 -->
        <div class="flex justify-between items-center">
          <div>
            <p class="font-medium text-gray-800">Delivery Payment</p>
            <p class="text-xs text-gray-500">Nov 30, 10:20 AM</p>
          </div>
          <p class="font-bold text-green-600">+ ₦2,500</p>
        </div>

      </div>
    </div>

  </section>

  <!-- Bottom Navigation -->
  <nav class="fixed bottom-0 left-0 w-full bg-white shadow-lg py-3 px-6 flex justify-between">
    <a href="rider_dashboard.html" class="text-gray-600">Home</a>
    <a href="rider_new_delivery.html" class="text-gray-600">New</a>
    <a href="rider_notifications.html" class="text-gray-600">Notifications</a>
    <a href="rider_profile.html" class="text-gray-600">Profile</a>
    <a href="rider_wallet.html" class="text-blue-600 font-semibold">Wallet</a>
  </nav>

</body>
</html>
