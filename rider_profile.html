<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rider Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- Header -->
  <header class="bg-white shadow p-4">
    <h1 class="text-xl font-bold text-gray-800">My Profile</h1>
  </header>

  <section class="p-4">

    <!-- Avatar Section -->
    <div class="bg-white p-6 rounded-xl shadow text-center">
      <div class="flex justify-center">
        <div class="w-24 h-24 bg-gray-300 rounded-full flex items-center justify-center text-3xl font-bold text-gray-600">
          R
        </div>
      </div>

      <h2 class="text-xl font-semibold mt-3 text-gray-800">Rider Name</h2>
      <p class="text-gray-500 text-sm">rider@example.com</p>

      <div class="mt-3">
        <span class="bg-green-100 text-green-700 px-3 py-1 text-xs rounded-full">
          ✔ Verified Rider
        </span>
      </div>

      <button class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg text-sm">
        Edit Profile
      </button>
    </div>

    <!-- Rider Stats -->
    <div class="bg-white p-4 rounded-xl shadow mt-6">
      <h3 class="font-bold text-gray-800 mb-4">Stats</h3>

      <div class="grid grid-cols-3 gap-3 text-center">
        <div class="p-3 bg-gray-50 rounded-lg">
          <h4 class="text-xl font-bold text-gray-800">120</h4>
          <p class="text-xs text-gray-500">Deliveries</p>
        </div>

        <div class="p-3 bg-gray-50 rounded-lg">
          <h4 class="text-xl font-bold text-gray-800">4.8</h4>
          <p class="text-xs text-gray-500">Rating</p>
        </div>

        <div class="p-3 bg-gray-50 rounded-lg">
          <h4 class="text-xl font-bold text-gray-800">₦85,200</h4>
          <p class="text-xs text-gray-500">Earnings</p>
        </div>
      </div>
    </div>

    <!-- Rider Information -->
    <div class="bg-white p-4 rounded-xl shadow mt-6">
      <h3 class="font-bold text-gray-800 mb-4">Personal Information</h3>

      <div class="space-y-3">
        <div>
          <p class="text-xs text-gray-500">Full Name</p>
          <p class="text-gray-800 font-medium">Rider Name</p>
        </div>

        <div>
          <p class="text-xs text-gray-500">Email</p>
          <p class="text-gray-800 font-medium">rider@example.com</p>
        </div>

        <div>
          <p class="text-xs text-gray-500">Phone</p>
          <p class="text-gray-800 font-medium">+234 800 000 0000</p>
        </div>

        <div>
          <p class="text-xs text-gray-500">Bike Model</p>
          <p class="text-gray-800 font-medium">Honda ACE 125</p>
        </div>

        <div>
          <p class="text-xs text-gray-500">Rider ID</p>
          <p class="text-gray-800 font-medium">RD-458920</p>
        </div>
      </div>
    </div>

    <!-- Logout -->
    <button class="w-full mt-6 bg-red-600 text-white py-3 rounded-lg font-semibold">
      Logout
    </button>

  </section>

  <!-- Bottom Navigation -->
  <nav class="fixed bottom-0 left-0 w-full bg-white shadow-lg py-3 px-6 flex justify-between">
    <a href="rider_dashboard.html" class="text-gray-600">Home</a>
    <a href="rider_new_delivery.html" class="text-gray-600">New</a>
    <a href="rider_notifications.html" class="text-gray-600">Notifications</a>
    <a href="rider_profile.html" class="text-blue-600 font-semibold">Profile</a>
  </nav>

</body>
</html>
